services:

  postgres:
    image: postgres:16-alpine
    container_name: baia360-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      POSTGRES_DB: baia360
      POSTGRES_USER: baia360
      POSTGRES_PASSWORD: ${baia360*postgres2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - baia360
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baia360"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: baia360-backend
    container_name: baia360-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - backend_data:/app/data
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - baia360
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-outlook:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    image: baia360-mcp
    container_name: baia360-mcp
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "5002:5002"
    networks:
      - baia360

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: baia360-frontend
    container_name: baia360-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - baia360

volumes:
  postgres_data:
  backend_data:

networks:
  baia360:
    driver: bridge