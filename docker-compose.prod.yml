services:

  postgres:
    image: postgres:16-alpine
    container_name: baia360-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      POSTGRES_DB: baia360
      POSTGRES_USER: baia360
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - baia360
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baia360"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: baia360-backend
    container_name: baia360-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      # Fase 5: topologia interna do compose, não um segredo — vive aqui em
      # vez do .env.production. DNS do Docker resolve "central" para o
      # container abaixo, na mesma rede.
      CENTRAL_BASE_URL: http://central:5003
      # Hardcoded aqui (não só no .env.production) para nunca mais ficar
      # faltando silenciosamente — sem isso, app.py assume 'development' e
      # o cookie JWT não sai marcado Secure, sem header HSTS, CORS aceita
      # origins localhost mesmo em prod.
      FLASK_ENV: production
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - baia360
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Fase 5 do desacoplamento Atlas/Central: processo/container próprio,
  # schema `central` (+ leitura de `identity`) no mesmo Postgres. SEM
  # "ports:" — isso é o isolamento de rede de verdade: nenhuma porta
  # publicada no host significa que não há nada pra alcançar de fora do
  # Docker, independente de qualquer regra de firewall externo. Só é
  # alcançável via DNS interno do Docker (http://central:5003), pelo
  # backend (Atlas, via central_client.py) ou pelo nginx (proxy_pass, ver
  # frontend/nginx.conf) para /api/modulos e /api/dashboard.
  central:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: baia360-central
    container_name: baia360-central
    restart: unless-stopped
    command: ["./entrypoint_central.sh"]
    env_file:
      - ./backend/.env.central.production
    environment:
      # Mesmo motivo do serviço backend acima — nunca depender só do arquivo
      # de secrets pra isso.
      FLASK_ENV: production
    volumes:
      # Movido do serviço backend: só central_app.py + modules/central_relatorios.py
      # tocam /app/data (estoque_db.json, fat_arm_familias.json, fat_arm_precos.json)
      # — Atlas nunca lê/escreve nada ali (grep confirmado). Volume nomeado, não
      # ligado a um container específico: reanexa aqui sem precisar migrar dado
      # nenhum, o que já estava na volume "backend_data" continua acessível.
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - baia360
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mcp-outlook:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    image: baia360-mcp
    container_name: baia360-mcp
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "5002:5002"
    networks:
      - baia360

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: baia360-frontend
    container_name: baia360-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - central
      - mcp-outlook
    networks:
      - baia360

volumes:
  postgres_data:
  backend_data:

networks:
  baia360:
    driver: bridge