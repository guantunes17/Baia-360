services:

  backend:
    build: ./backend
    container_name: baia360-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Dev quer que o .env local vença qualquer env var pré-existente no
      # shell/container — oposto do default seguro de produção (ver
      # load_dotenv(..., override=...) em app.py/central_app.py).
      DOTENV_OVERRIDE: "1"
    volumes:
      - ./backend:/app
      - /app/venv
    ports:
      - "5001:5001"
    networks:
      - baia360

  frontend:
    build:
      context: ./frontend
      args:
        VITE_MODE: development
    container_name: baia360-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - baia360

networks:
  baia360:
    driver: bridge