services:

  backend:
    build: ./backend
    container_name: baia360-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/venv
    ports:
      - "5001:5001"
    networks:
      - baia360

  frontend:
    build: ./frontend
    container_name: baia360-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - baia360

networks:
  baia360:
    driver: bridge