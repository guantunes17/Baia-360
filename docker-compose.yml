services:

  backend:
    build: ./backend
    container_name: baia360-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Dev quer que o .env local vença qualquer env var pré-existente no
      # shell/container — oposto do default seguro de produção (ver
      # load_dotenv(..., override=...) em app.py/central_app.py).
      DOTENV_OVERRIDE: "1"
    volumes:
      - ./backend:/app
      - /app/venv
    ports:
      - "5001:5001"
    networks:
      - baia360

  # Espelha o serviço "central" de docker-compose.prod.yml — sem isso, /api/modulos
  # e /api/dashboard 404iam em dev (tudo caía em "backend" antes desta correção).
  # Copie backend/.env.central.example para backend/.env.central antes de subir.
  central:
    build: ./backend
    container_name: baia360-central
    restart: unless-stopped
    command: ["./entrypoint_central.sh"]
    env_file:
      - ./backend/.env.central
    environment:
      DOTENV_OVERRIDE: "1"
    volumes:
      - ./backend:/app
      - /app/venv
      - backend_data:/app/data
    ports:
      - "5003:5003"
    networks:
      - baia360

  frontend:
    build:
      context: ./frontend
      args:
        VITE_MODE: development
    container_name: baia360-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - central
    networks:
      - baia360

volumes:
  backend_data:

networks:
  baia360:
    driver: bridge